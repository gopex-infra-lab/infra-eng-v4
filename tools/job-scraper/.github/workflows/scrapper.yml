name: Job Scraper (Docker)

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: [self-hosted, docker]

    defaults:
      run:
        working-directory: job-scraper

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t job-scraper .

      - name: Run scraper container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/job-scraper:/app \
            -e SERPAPI_KEY=${{ secrets.SERPAPI_KEY }} \
            -e EMAIL_FROM=${{ secrets.EMAIL_FROM }} \
            -e EMAIL_TO=${{ secrets.EMAIL_TO }} \
            -e EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }} \
            job-scraper
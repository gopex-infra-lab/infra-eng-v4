version: "3.9"

services:

  api:
    build:
      context: ../app
    container_name: fastapi_lab
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_lab
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: labpass
      POSTGRES_DB: labdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

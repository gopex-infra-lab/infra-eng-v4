services:
  db:
    image: postgres:16
    container_name: bixi_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"          # LAN-exposed for ingestor VM + Power BI
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - bixi_net
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  bixi_net:
    driver: bridge
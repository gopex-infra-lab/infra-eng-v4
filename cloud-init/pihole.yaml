#cloud-config
hostname: ${hostname}

users:
  - name: gomg
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${infra_public_key}

ssh_pwauth: false
disable_root: true

package_update: true
package_upgrade: false

write_files:
  - path: /home/gomg/.ssh/id_ed25519_github
    permissions: '0600'
    owner: gomg:gomg
    content: |
      ${indent(6, git_private_key)}

  - path: /home/gomg/.ssh/config
    permissions: '0600'
    owner: gomg:gomg
    content: |
      Host github.com
        IdentityFile ~/.ssh/id_ed25519_github
        IdentitiesOnly yes

write_files:
  - path: /usr/local/bin/bootstrap.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      echo "=== Installing dependencies ==="
      apt update
      apt remove -y containerd.io
      apt install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

      systemctl enable docker
      systemctl start docker

      echo "=== Creating Pi-hole directories ==="
      mkdir -p /opt/pihole

      echo "=== Writing docker-compose ==="
      cat <<EOF > /opt/pihole/docker-compose.yml
      version: "3"

      services:
        pihole:
          image: pihole/pihole:latest
          container_name: pihole
          network_mode: host
          environment:
            TZ: "America/Montreal"
            WEBPASSWORD: "admin"
          volumes:
            - ./etc-pihole:/etc/pihole
            - ./etc-dnsmasq.d:/etc/dnsmasq.d
          restart: unless-stopped
      EOF

      echo "=== Starting Pi-hole ==="
      cd /opt/pihole
      docker compose up -d

runcmd:
  - /usr/local/bin/bootstrap.sh
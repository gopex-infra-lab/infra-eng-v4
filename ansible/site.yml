- hosts: all
  gather_facts: false

  tasks:  
    - name: Add host to known_hosts
      known_hosts:
        name: "{{ ansible_host }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -H ' + ansible_host) }}"
        path: "~/.ssh/known_hosts"

    - name: Wait for SSH port
      wait_for:
        #host: "{{ ansible_host | default(inventory_hostname) }}"
        host: "{{ ansible_host }}"
        port: 22
        timeout: 300

    - name: Wait for SSH to be ready
      wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to finish
      raw: cloud-init status --wait
      changed_when: false

- hosts: all
  become: true
  roles:
    - ssh_setup
    - bootstrap
    - docker
    - common

- hosts: fastapi
  become: true
  roles:
    - app_fastapi
- hosts: all
  gather_facts: false

  tasks:
    - name: Wait for SSH port
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 22
        timeout: 300

    - name: Wait for SSH to be ready
      wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to finish
      raw: cloud-init status --wait
      changed_when: false

- hosts: all
  become: true

  roles:
    - role: ssh_setup
      when: bootstrap

    - role: bootstrap
      when: bootstrap

    - role: common

    - role: app_fastapi
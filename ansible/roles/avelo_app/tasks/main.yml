---
- name: Create app directory
  ansible.builtin.file:
    path: "{{ avelo_app_dir }}"
    state: directory
    mode: "0755"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ avelo_app_dir }}/docker-compose.yml"
    mode: "0644"

- name: Render .env (secrets)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ avelo_app_dir }}/.env"
    mode: "0600"
  no_log: true

# Only runs when GHCR packages are private (token provided). Public => skipped.
- name: Log into GHCR (private packages only)
  ansible.builtin.command:
    cmd: "docker login ghcr.io -u {{ avelo_ghcr_user }} --password-stdin"
    stdin: "{{ avelo_ghcr_token }}"
  no_log: true
  changed_when: false
  when: avelo_ghcr_token is defined and avelo_ghcr_token | length > 0

- name: Pull images for the target tag
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ avelo_app_dir }}"
  changed_when: true

- name: Bring up / update the stack
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans
    chdir: "{{ avelo_app_dir }}"
  changed_when: true

- name: Prune unused images
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: false
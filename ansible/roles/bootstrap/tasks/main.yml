# ansible/roles/bootstrap/tasks/main.yml

- name: Wait for apt lock to be released
  shell: |
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
      sleep 5
    done
  changed_when: false

- name: Disable unattended upgrades
  systemd:
    name: unattended-upgrades
    enabled: false
    state: stopped

- name: Install base packages
  apt:
    name:
      - curl
      - vim
      - ca-certificates
      - openssl
      - rsync
    state: present
    update_cache: yes

- name: Create app user
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes
    state: present

- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ app_user }}/.ssh"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0700"

- name: Fix SSH permissions (after key exists)
  file:
    path: "/home/{{ app_user }}/.ssh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Install git (bootstrap, universal)
  package:
    name: git
    state: present
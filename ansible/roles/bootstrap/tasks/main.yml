- name: Check if Docker is installed
  command: docker --version
  register: docker_check
  ignore_errors: true
  changed_when: false

- name: Install git
  raw: |
    if command -v dnf >/dev/null 2>&1; then
      sudo dnf install -y git
    elif command -v yum >/dev/null 2>&1; then
      sudo yum install -y git
    elif command -v apt-get >/dev/null 2>&1; then
      sudo apt-get update && sudo apt-get install -y git
    fi

- name: Install Docker
  raw: |
    if command -v dnf >/dev/null 2>&1; then
      sudo dnf install -y docker
    elif command -v yum >/dev/null 2>&1; then
      sudo yum install -y docker
    elif command -v apt-get >/dev/null 2>&1; then
      sudo apt-get update && sudo apt-get install -y docker.io
    fi
  when: docker_check.rc != 0

- name: Start Docker
  when: env is defined and env == "aws"
  raw: sudo systemctl enable --now docker
  when: docker_check.rc != 0

- name: Install compose + buildx
  raw: |
    sudo mkdir -p /usr/lib/docker/cli-plugins
    sudo curl -fsSL https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 \
      -o /usr/lib/docker/cli-plugins/docker-compose
    sudo curl -fsSL https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-amd64 \
      -o /usr/lib/docker/cli-plugins/docker-buildx
    sudo chmod +x /usr/lib/docker/cli-plugins/docker-*
  when: docker_check.rc != 0
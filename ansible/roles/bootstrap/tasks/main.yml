# ansible/roles/bootstrap/tasks/main.yml

- name: Install base packages
  apt:
    name:
      - curl
      - vim
      - git
      - ca-certificates
      - openssl
    state: present
    update_cache: yes

- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ app_user }}/.ssh"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0700"

- name: Fix SSH permissions (after key exists)
  file:
    path: "/home/{{ app_user }}/.ssh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Install git (bootstrap, universal)
  package:
    name: git
    state: present
- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ app_user }}/.ssh"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0700"

- name: Fix SSH permissions (after key exists)
  file:
    path: "/home/{{ app_user }}/.ssh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Configure SSH for GitHub
  copy:
    dest: "/home/{{ app_user }}/.ssh/config"
    content: |
      Host github.com
        IdentityFile /home/{{ app_user }}/.ssh/id_ed25519_github
        IdentitiesOnly yes
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

- name: Add GitHub to known_hosts
  become_user: "{{ app_user }}"
  known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan github.com') }}"
    path: "/home/{{ app_user }}/.ssh/known_hosts"

- name: Create app directory
  file:
    path: /opt/app
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"

- name: Create .env file
  copy:
    dest: /opt/app/.env
    content: |
      POSTGRES_DB={{ postgres_db }}
      POSTGRES_USER={{ postgres_user }}
      POSTGRES_PASSWORD={{ postgres_password }}
    owner: "{{ app_user }}"
    mode: '0600'

- name: Install git (bootstrap, universal)
  raw: |
    if command -v dnf >/dev/null 2>&1; then
      sudo dnf install -y git
    elif command -v yum >/dev/null 2>&1; then
      sudo yum install -y git
    elif command -v apt-get >/dev/null 2>&1; then
      sudo apt-get update && sudo apt-get install -y git
    else
      echo "No supported package manager found" && exit 1
    fi

- name: Create git SSH wrapper
  copy:
    dest: "/home/{{ app_user }}/.ssh/git_ssh.sh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0700"
    content: |
      #!/bin/sh
      exec ssh -i /home/{{ app_user }}/.ssh/id_ed25519_github \
        -o IdentitiesOnly=yes \
        -o StrictHostKeyChecking=no \
        "$@"

- name: Ensure source directory exists
  file:
    path: /opt/src
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

#- name: Clean runtime directory
#  file:
#    path: /opt/app
#    state: absent

#- name: Recreate runtime directory
#  file:
#    path: /opt/app
#    state: directory
#    owner: "{{ app_user }}"
#    mode: '0755'

- name: Ensure runtime directory exists
  file:
    path: /opt/app
    state: directory
    owner: "{{ app_user }}"
    mode: '0755'

# 2. (Recovery) Fix ownership if previously created as root
- name: Fix ownership of /opt/src
  file:
    path: /opt/src
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes
  when: fix_src_permissions | default(true)

- name: Clone repo (forced SSH command)
  become: true
  become_user: "{{ app_user }}"
  git:
    repo: "git@github.com:gopex-infra-lab/infra-eng-lab-v4.git"
    dest: /opt/src/infra-eng-lab
    version: dev
    accept_hostkey: yes
    key_file: "/home/{{ app_user }}/.ssh/id_ed25519_github"
  become: true
  become_user: "{{ app_user }}"

- name: Copy docker-compose
  copy:
    src: /opt/src/infra-eng-lab/docker/fastapi/docker-compose.yml
    dest: /opt/app/docker-compose.yml
    remote_src: yes

- name: Copy app source
  copy:
    src: /opt/src/infra-eng-lab/app/
    dest: /opt/app/app
    remote_src: yes

- name: Add user to docker group
  raw: sudo usermod -aG docker {{ app_user }}


- name: Deploy containers (idempotent)
  community.docker.docker_compose_v2:
    project_src: /opt/app
    build: policy

- name: Check API health
  uri:
    url: "http://localhost:8000/health"
    method: GET
  register: health
  retries: 5
  delay: 3
  until: health.status == 200
- name: Install GitHub private key
  copy:
    src: id_ed25519_github
    dest: "/home/{{ app_user }}/.ssh/id_ed25519_github"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

- name: Configure SSH for GitHub
  copy:
    dest: "/home/{{ app_user }}/.ssh/config"
    content: |
      Host github.com
        IdentityFile /home/{{ app_user }}/.ssh/id_ed25519_github
        IdentitiesOnly yes
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

- name: Create app directory
  file:
    path: /opt/app
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"

- name: Create .env file
  copy:
    dest: /opt/app/.env
    content: |
      POSTGRES_DB={{ postgres_db }}
      POSTGRES_USER={{ postgres_user }}
      POSTGRES_PASSWORD={{ postgres_password }}
    owner: "{{ app_user }}"
    mode: '0600'


- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ app_user }}/.ssh"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0700"

- name: Fix SSH permissions (after key exists)
  file:
    path: "/home/{{ app_user }}/.ssh"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Check if GitHub key exists
  stat:
    path: "/home/{{ app_user }}/.ssh/id_ed25519_github"
  register: github_key

- name: Add GitHub to known_hosts
  become_user: "{{ app_user }}"
  known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan github.com') }}"
    path: "/home/{{ app_user }}/.ssh/known_hosts"

- name: Install GitHub private key
  copy:
    src: id_ed25519_github
    dest: "/home/{{ app_user }}/.ssh/id_ed25519_github"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

- name: Configure SSH for GitHub
  copy:
    dest: "/home/{{ app_user }}/.ssh/config"
    content: |
      Host github.com
        IdentityFile /home/{{ app_user }}/.ssh/id_ed25519_github
        IdentitiesOnly yes
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"
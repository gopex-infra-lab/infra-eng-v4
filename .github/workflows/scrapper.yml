name: Job Scraper (Docker)

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t job-scraper ./tools/job-scraper
      
      - name: Build Api image
        run: docker build -t job-api -f tools/job-scraper/Dockerfile.api tools/job-scraper
      
      - name: Run api container
        run : |
          docker run -d \
            --name job-api \
            --restart unless-stopped \
            -p 8000:8000 \
            -u $(id -u):$(id -g) \
            -v $HOME/job-scraper-data:/data \
            -e DB_PATH=/data/jobs.db \
            job-api

      - name: Run scraper container
        run: |
          docker run --rm \
            -u $(id -u):$(id -g) \
            -v $HOME/job-scraper-data:/data \
            -e DB_PATH=/data/jobs.db \
            -e SERPAPI_KEY=${{ secrets.SERPAPI_KEY }} \
            -e EMAIL_FROM=${{ secrets.EMAIL_FROM }} \
            -e EMAIL_TO=${{ secrets.EMAIL_TO }} \
            -e EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }} \
            job-scraper
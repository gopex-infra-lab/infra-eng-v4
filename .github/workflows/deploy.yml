name: Deploy (Terraform + Ansible)

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev, main ]

  workflow_dispatch:
    inputs:
      environment:
        description: "environment"
        required: true
        default: "lab"
        type: choice
        options:
          - lab
          - core
          - aws

      action:
        description: "terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy
          - plan

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:

  block-main:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
  
  deploy:
    if: |
      github.event_name == 'pull_request' ||
      (github.ref == 'refs/heads/dev' && github.event_name == 'push') ||
      (github.ref == 'refs/heads/dev' && github.event_name == 'workflow_dispatch') ||
      (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'core')
    runs-on: self-hosted
    env:
      TF_VAR_pm_api_url: ${{ secrets.PM_API_URL }}
      TF_VAR_pm_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
      TF_VAR_pm_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}
      TF_VAR_infra_public_key: ${{ secrets.INFRA_PUBLIC_KEY }}
      TF_VAR_infra_private_key: ${{ secrets.INFRA_PRIVATE_KEY }}

      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "core" ]; then
            echo "DIR=core-infra" >> $GITHUB_OUTPUT
            echo "INV=inventory/core.ini" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.environment }}" = "aws" ]; then
            echo "DIR=aws" >> $GITHUB_OUTPUT
            echo "INV=inventory/aws.ini" >> $GITHUB_OUTPUT
          else
            echo "DIR=lab" >> $GITHUB_OUTPUT
            echo "INV=inventory/lab.ini" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        working-directory: ${{ steps.env.outputs.DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ steps.env.outputs.DIR }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        working-directory: ${{ steps.env.outputs.DIR }}
        run: terraform apply -auto-approve tfplan
      
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        working-directory: ${{ steps.env.outputs.DIR }}
        run: terraform destroy -auto-approve -input=false

      - name: Install Ansible Collection
        working-directory: ansible
        run: ansible-galaxy collection install community.docker --force

      - name: Place GitHub key for Ansible
        run: |
          mkdir -p ansible/files
          printf "%s\n" "${{ secrets.GIT_PRIVATE_KEY }}" > ansible/files/id_ed25519_github
          chmod 600 ansible/files/id_ed25519_github

      - name: Place infra SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.INFRA_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_infra
          chmod 600 ~/.ssh/id_ed25519_infra

      - name: Generate AWS inventory
        if: steps.env.outputs.DIR == 'aws'
        run: |
          IP=$(terraform -chdir=aws output -raw ec2_public_ip)

          mkdir -p ansible/inventory

          cat <<EOF > ansible/inventory/aws.ini
          [aws]
          ec2 ansible_host=$IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_ed25519_infra ansible_python_interpreter=/usr/bin/python3 ansible_become=true

          [aws:vars]
          app_user=ec2-user
          EOF

      - name: Run Ansible
        working-directory: ansible
        run: ansible-playbook site.yml -i ${{ steps.env.outputs.INV }} -e env=${{ github.event.inputs.environment }}
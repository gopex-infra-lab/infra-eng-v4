name: deploy-avelo

on:
  repository_dispatch:
    types: [deploy-avelo]
  workflow_dispatch:
    inputs:
      sha:
        description: "Image tag (git SHA) to deploy; 'latest' if blank"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Ansible
        run: |
          python3 -m pip install --user "ansible-core==2.17.*" >/dev/null
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set environment
        id: env
        run: |
          echo "DIR=core" >> "$GITHUB_OUTPUT"
          echo "INV=inventory/core.ini" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        run: |
          tag="${{ github.event.client_payload.sha }}"
          [ -z "$tag" ] && tag="${{ github.event.inputs.sha }}"
          [ -z "$tag" ] && tag="latest"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook site.yml \
            -i inventory.ini \
            --limit avelo_fleet \
            --tags avelo \
            -e "avelo_image_tag=${{ steps.tag.outputs.tag }}" \
            -e "avelo_pg_password=${{ secrets.AVELO_PG_PASSWORD }}" \
            -e "avelo_grafana_password=${{ secrets.AVELO_GRAFANA_PASSWORD }}"
